name: Code Check

on:
push:
branches:
- main
pull_request:

permissions:
contents: read

env:
PYTHON_VERSION: "3.12"

jobs:
lint:
name: Lint Code
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: ${{ env.PYTHON_VERSION }}
      cache: pip

  - name: Install dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt
      pip install pylint

  - name: Run pylint
    run: pylint webexp
```

build:
name: Build Package
runs-on: ubuntu-latest
needs: lint

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: ${{ env.PYTHON_VERSION }}
      cache: pip

  - name: Install build dependencies
    run: |
      python -m pip install --upgrade pip
      pip install build

  - name: Build package
    run: python -m build

  - name: Verify installation
    run: |
      python -m pip install .
```

release:
name: Draft Release
runs-on: ubuntu-latest
needs: build

```
if: github.event_name == 'push' && github.ref == 'refs/heads/main'

permissions:
  contents: write
  id-token: write

steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Create draft release
    uses: KoblerS/create-release@v1
    with:
      version-prefix: ""
```
